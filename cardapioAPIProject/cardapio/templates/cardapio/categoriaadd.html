{% extends 'cardapio/layout.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'cardapio/css/estilo.css' %}">

<h1 class="add-form">Adicionar Categoria de Itens</h1>
<form action="{% url 'categoriaadd' %}" method="post" class="add-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nome">Nome da Categoria:</label>
            <input type="text" class="form-control" id="nome" name="nome" required>
        </div>
        
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea class="form-control" id="descricao" name="descricao" rows="4" required></textarea>
        </div>
            
        <button type="submit" class="submit-btn">Criar categoria!</button>
    </form>
{% endblock %}
